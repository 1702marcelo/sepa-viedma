name: Actualizar Precios SEPA

on:
  # Ejecutar automáticamente todos los días a las 13:00 hora Argentina (UTC-3 = 16:00 UTC)
  schedule:
    - cron: '0 16 * * *'

  # También permite ejecutarlo manualmente desde GitHub (desde el celular)
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo de la actualización manual (opcional)'
        required: false
        default: 'Actualización manual'

jobs:
  actualizar-precios:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # máximo 1 hora por si el ZIP tarda mucho

    permissions:
      contents: write     # necesario para hacer commit del JSON

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        run: python actualizar_precios.py

      - name: Guardar precios en el repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precios_viedma_hoy.json
          # Solo hace commit si el archivo cambió
          git diff --staged --quiet || git commit -m "✅ Precios actualizados $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase && git push
