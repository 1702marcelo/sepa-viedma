name: Actualizar Precios SEPA

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  actualizar-precios:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de actualización
        run: python actualizar_precios.py

      - name: Guardar precios en el repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-rebase
          git add precios_viedma_hoy.json
          git diff --staged --quiet || git commit -m "✅ Precios actualizados $(date '+%Y-%m-%d %H:%M UTC')"
          git push
